# Production profile - MySQL database
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/project?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  sql:
    init:
      mode: never

logging:
  level:
    com.example.demo: INFO
    org.springframework.security: WARN
