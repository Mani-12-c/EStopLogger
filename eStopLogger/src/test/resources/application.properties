# Test profile - override to use H2 in-memory database
spring.profiles.active=test

spring.application.name=eStopLogger

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable SQL init scripts in tests
spring.sql.init.mode=never

# JWT Configuration
app.jwt.secret=Y29tLmV4YW1wbGUuZXN0b3Bsb2dnZXIuand0LnNlY3JldC5rZXkuZm9yLmhzMjU2LnNpZ25pbmc=
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging - minimal for tests
logging.level.root=WARN
logging.level.com.example.demo=INFO
